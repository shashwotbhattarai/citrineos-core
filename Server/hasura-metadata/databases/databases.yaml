- name: default
  kind: postgres
  configuration:
    connection_info:
      database_url:
        from_env: HASURA_GRAPHQL_DATABASE_URL
      isolation_level: read-committed
      pool_settings:
        connection_lifetime: 300
        idle_timeout: 60
        max_connections: 15
        retries: 1
      use_prepared_statements: true
  tables: "!include default/tables/tables.yaml"
