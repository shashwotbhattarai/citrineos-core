# Docker Compose for EC2 Production Deployment with Watchtower Auto-Update
#
# Usage:
#   1. Copy .env.example to .env and fill in your credentials
#   2. Login to Docker Hub: docker login -u YOUR_USERNAME
#   3. Run: docker compose up -d
#
# Prerequisites:
#   - AWS RDS PostgreSQL instance with PostGIS extension
#   - AWS S3 bucket for config storage
#   - Docker Hub account with access to private yatri-energy-citrine image
#
# Watchtower will automatically pull and deploy new images tagged :cicd
#
# STARTUP ORDER (CRITICAL for metadata to work):
#   1. amqp-broker (RabbitMQ)
#   2. citrine (runs DB migrations, creates tables)
#   3. graphql-engine (applies Hasura metadata to existing tables)
#   4. watchtower (monitors for updates)
#
# If metadata fails, it means citrine hasn't created the tables yet.
# Hasura MUST start AFTER citrine is healthy.
#
# CONFIG SEPARATION:
#   Bootstrap (.env with BOOTSTRAP_* prefix) = secrets, infrastructure, healthcheck deps
#   System (config.json in S3) = application behavior
#   No hardcoded defaults - all values MUST be in .env

services:
  amqp-broker:
    image: rabbitmq:3-management
    ports:
      - 127.0.0.1:25672:15672
      - 127.0.0.1:5672:5672
    environment:
      RABBITMQ_DEFAULT_USER: ${BOOTSTRAP_RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${BOOTSTRAP_RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q check_port_connectivity
      interval: 10s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  citrine:
    image: ${BOOTSTRAP_DOCKERHUB_USERNAME}/yatri-energy-citrine:cicd
    environment:
      APP_NAME: 'all'
      APP_ENV: 'docker'
      DB_STRATEGY: 'migrate'
      # === AWS RDS DATABASE CONFIGURATION ===
      BOOTSTRAP_CITRINEOS_DATABASE_HOST: ${BOOTSTRAP_RDS_HOST}
      BOOTSTRAP_CITRINEOS_DATABASE_PORT: ${BOOTSTRAP_RDS_PORT}
      BOOTSTRAP_CITRINEOS_DATABASE_NAME: ${BOOTSTRAP_RDS_DATABASE}
      BOOTSTRAP_CITRINEOS_DATABASE_USERNAME: ${BOOTSTRAP_RDS_USERNAME}
      BOOTSTRAP_CITRINEOS_DATABASE_PASSWORD: ${BOOTSTRAP_RDS_PASSWORD}
      BOOTSTRAP_CITRINEOS_DATABASE_DIALECT: 'postgres'
      BOOTSTRAP_CITRINEOS_DATABASE_SSL: ${BOOTSTRAP_RDS_SSL}
      BOOTSTRAP_CITRINEOS_DATABASE_SYNC: 'false'
      BOOTSTRAP_CITRINEOS_DATABASE_ALTER: 'false'
      BOOTSTRAP_CITRINEOS_DATABASE_MAX_RETRIES: ${BOOTSTRAP_RDS_MAX_RETRIES}
      BOOTSTRAP_CITRINEOS_DATABASE_RETRY_DELAY: ${BOOTSTRAP_RDS_RETRY_DELAY}
      BOOTSTRAP_CITRINEOS_DATABASE_POOL_MAX: ${BOOTSTRAP_RDS_POOL_MAX}
      BOOTSTRAP_CITRINEOS_DATABASE_POOL_MIN: ${BOOTSTRAP_RDS_POOL_MIN}
      # Config filename
      BOOTSTRAP_CITRINEOS_CONFIG_FILENAME: 'config.json'
      # === AWS S3 FILE STORAGE CONFIGURATION ===
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_TYPE: 's3'
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_S3_REGION: ${BOOTSTRAP_AWS_REGION}
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_S3_DEFAULT_BUCKET_NAME: ${BOOTSTRAP_S3_BUCKET_NAME}
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_S3_FORCE_PATH_STYLE: 'false'
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_S3_ACCESS_KEY_ID: ${BOOTSTRAP_AWS_ACCESS_KEY_ID}
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_S3_SECRET_ACCESS_KEY: ${BOOTSTRAP_AWS_SECRET_ACCESS_KEY}
      # AWS Configuration (for SDK)
      AWS_REGION: ${BOOTSTRAP_AWS_REGION}
      AWS_ACCESS_KEY_ID: ${BOOTSTRAP_AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${BOOTSTRAP_AWS_SECRET_ACCESS_KEY}
      # === INTERNAL RABBITMQ (CitrineOS message broker) ===
      # AMQP_URL and AMQP_EXCHANGE are built here and read by code via process.env
      AMQP_URL: amqp://${BOOTSTRAP_RABBITMQ_USER}:${BOOTSTRAP_RABBITMQ_PASS}@amqp-broker:5672
      AMQP_EXCHANGE: ${BOOTSTRAP_AMQP_EXCHANGE}
      # === API AUTHENTICATION ===
      # API key secret for service-to-service auth (config.json just sets apiKey: true)
      CITRINEOS_API_KEY: ${BOOTSTRAP_CITRINEOS_API_KEY}
      # === YATRI ENERGY INTEGRATION (Bootstrap - secrets & healthcheck) ===
      # NOTE: timeout and minimumBalance are in config.json, NOT here
      YATRI_ENERGY_BASE_URL: ${BOOTSTRAP_YATRI_ENERGY_BASE_URL}
      YATRI_ENERGY_API_KEY: ${BOOTSTRAP_YATRI_ENERGY_API_KEY}
      YATRI_WALLET_INTEGRATION_ENABLED: ${BOOTSTRAP_YATRI_WALLET_INTEGRATION_ENABLED}
      # AWS SQS Configuration (Async Payment Processing)
      YATRI_ENERGY_SQS_REGION: ${BOOTSTRAP_YATRI_ENERGY_SQS_REGION}
      YATRI_ENERGY_SQS_QUEUE_URL: ${BOOTSTRAP_YATRI_ENERGY_SQS_QUEUE_URL}
      # Midlayer RabbitMQ (for async payment queue)
      YATRI_ENERGY_RABBITMQ_URL: ${BOOTSTRAP_YATRI_ENERGY_RABBITMQ_URL}
      YATRI_ENERGY_RABBITMQ_EXCHANGE: ${BOOTSTRAP_YATRI_ENERGY_RABBITMQ_EXCHANGE}
    depends_on:
      amqp-broker:
        condition: service_healthy
    ports:
      - 127.0.0.1:8080:8080
      - 127.0.0.1:8081:8081
      - 127.0.0.1:8082:8082
      - 127.0.0.1:8443:8443
      - 127.0.0.1:8444:8444
      - 127.0.0.1:18092:8092
      - 127.0.0.1:18093:8093
      - 127.0.0.1:18094:8094
      - 127.0.0.1:8095:8095
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  graphql-engine:
    image: ${BOOTSTRAP_DOCKERHUB_USERNAME}/yatri-energy-hasura:cicd
    ports:
      - 127.0.0.1:18090:8080
    depends_on:
      citrine:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${BOOTSTRAP_RDS_USERNAME}:${BOOTSTRAP_RDS_PASSWORD}@${BOOTSTRAP_RDS_HOST}:${BOOTSTRAP_RDS_PORT}/${BOOTSTRAP_RDS_DATABASE}?sslmode=require
      HASURA_GRAPHQL_ADMIN_SECRET: ${BOOTSTRAP_HASURA_ADMIN_SECRET}
      HASURA_GRAPHQL_ENABLE_CONSOLE: 'true'
      HASURA_GRAPHQL_DEV_MODE: ${BOOTSTRAP_HASURA_DEV_MODE}
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
      HASURA_GRAPHQL_ENABLE_TELEMETRY: 'false'
      HASURA_GRAPHQL_METADATA_DEFAULTS: '{"backend_configs":{"dataconnector":{"athena":{"uri":"http://data-connector-agent:8081/api/v1/athena"},"mariadb":{"uri":"http://data-connector-agent:8081/api/v1/mariadb"},"mysql8":{"uri":"http://data-connector-agent:8081/api/v1/mysql"},"oracle":{"uri":"http://data-connector-agent:8081/api/v1/oracle"},"snowflake":{"uri":"http://data-connector-agent:8081/api/v1/snowflake"}}}}'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/healthz']
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    environment:
      DOCKER_API_VERSION: 1.44
      WATCHTOWER_CLEANUP: 'true'
      WATCHTOWER_POLL_INTERVAL: 30
      WATCHTOWER_LABEL_ENABLE: 'true'
      WATCHTOWER_INCLUDE_RESTARTING: 'true'
      WATCHTOWER_ROLLING_RESTART: 'true'
      WATCHTOWER_NOTIFICATIONS: 'shoutrrr'
      WATCHTOWER_NOTIFICATION_URL: ${BOOTSTRAP_WATCHTOWER_NOTIFICATION_URL}
    restart: unless-stopped

volumes:
  rabbitmq_data:
