#
# Docker Compose configuration for AWS RDS + S3 Storage
# Usage:
#   1. Copy .env.s3.example to .env.s3 and fill in your AWS credentials
#   2. Run: docker compose -f docker-compose-s3.yml --env-file .env.s3 up -d
#
# Prerequisites:
#   - AWS RDS PostgreSQL instance with PostGIS extension enabled
#   - AWS S3 bucket (will be auto-created if IAM permissions allow)
#   - Security group allowing inbound traffic on port 5432
#   - PostGIS extension created: CREATE EXTENSION IF NOT EXISTS postgis;
#
# This configuration removes local PostgreSQL and MinIO in favor of AWS services

services:
  amqp-broker:
    image: rabbitmq:3-management
    ports:
      - 15672:15672
      - 5672:5672
    environment:
      RABBITMQ_DEFAULT_USER: 'guest'
      RABBITMQ_DEFAULT_PASS: 'guest'
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q check_port_connectivity
      interval: 10s
      timeout: 10s
      retries: 3

  citrine:
    build:
      context: ../
      dockerfile: ./Server/deploy.Dockerfile
    volumes:
      - ../package-lock.json:/usr/local/apps/citrineos/package-lock-host.json
      - ../package.json:/usr/local/apps/citrineos/package.json
      - ../tsconfig.json:/usr/local/apps/citrineos/tsconfig.json
      - ../tsconfig.build.json:/usr/local/apps/citrineos/tsconfig.build.json
      - ../Server:/usr/local/apps/citrineos/Server
      - ../00_Base:/usr/local/apps/citrineos/00_Base
      - ../01_Data:/usr/local/apps/citrineos/01_Data
      - ../02_Util:/usr/local/apps/citrineos/02_Util
      - ../03_Modules/Certificates:/usr/local/apps/citrineos/03_Modules/Certificates
      - ../03_Modules/Configuration:/usr/local/apps/citrineos/03_Modules/Configuration
      - ../03_Modules/EVDriver:/usr/local/apps/citrineos/03_Modules/EVDriver
      - ../03_Modules/Monitoring:/usr/local/apps/citrineos/03_Modules/Monitoring
      - ../03_Modules/OcppRouter:/usr/local/apps/citrineos/03_Modules/OcppRouter
      - ../03_Modules/Reporting:/usr/local/apps/citrineos/03_Modules/Reporting
      - ../03_Modules/SmartCharging:/usr/local/apps/citrineos/03_Modules/SmartCharging
      - ../03_Modules/Transactions:/usr/local/apps/citrineos/03_Modules/Transactions
      - /usr/local/apps/citrineos/node_modules
      - /usr/local/apps/citrineos/Server/node_modules
      - /usr/local/apps/citrineos/00_Base/node_modules
      - /usr/local/apps/citrineos/01_Data/node_modules
      - /usr/local/apps/citrineos/02_Util/node_modules
      - /usr/local/apps/citrineos/03_Modules/Certificates/node_modules
      - /usr/local/apps/citrineos/03_Modules/Configuration/node_modules
      - /usr/local/apps/citrineos/03_Modules/EVDriver/node_modules
      - /usr/local/apps/citrineos/03_Modules/Monitoring/node_modules
      - /usr/local/apps/citrineos/03_Modules/OcppRouter/node_modules
      - /usr/local/apps/citrineos/03_Modules/Reporting/node_modules
      - /usr/local/apps/citrineos/03_Modules/SmartCharging/node_modules
      - /usr/local/apps/citrineos/03_Modules/Transactions/node_modules
      - /usr/local/apps/citrineos/dist/
      - /usr/local/apps/citrineos/Server/dist/
      - /usr/local/apps/citrineos/00_Base/dist/
      - /usr/local/apps/citrineos/01_Data/dist/
      - /usr/local/apps/citrineos/02_Util/dist/
      - /usr/local/apps/citrineos/03_Modules/Certificates/dist/
      - /usr/local/apps/citrineos/03_Modules/Configuration/dist/
      - /usr/local/apps/citrineos/03_Modules/EVDriver/dist/
      - /usr/local/apps/citrineos/03_Modules/Monitoring/dist/
      - /usr/local/apps/citrineos/03_Modules/OcppRouter/dist/
      - /usr/local/apps/citrineos/03_Modules/Reporting/dist/
      - /usr/local/apps/citrineos/03_Modules/SmartCharging/dist/
      - /usr/local/apps/citrineos/03_Modules/Transactions/dist/
    environment:
      APP_NAME: 'all'
      APP_ENV: 'docker'
      # Database Strategy
      DB_STRATEGY: 'migrate'
      # === AWS RDS DATABASE CONFIGURATION ===
      BOOTSTRAP_CITRINEOS_DATABASE_HOST: ${RDS_HOST}
      BOOTSTRAP_CITRINEOS_DATABASE_PORT: ${RDS_PORT:-5432}
      BOOTSTRAP_CITRINEOS_DATABASE_NAME: ${RDS_DATABASE:-citrine}
      BOOTSTRAP_CITRINEOS_DATABASE_USERNAME: ${RDS_USERNAME}
      BOOTSTRAP_CITRINEOS_DATABASE_PASSWORD: ${RDS_PASSWORD}
      BOOTSTRAP_CITRINEOS_DATABASE_DIALECT: 'postgres'
      BOOTSTRAP_CITRINEOS_DATABASE_SSL: ${RDS_SSL:-true}
      BOOTSTRAP_CITRINEOS_DATABASE_SYNC: 'false'
      BOOTSTRAP_CITRINEOS_DATABASE_ALTER: 'false'
      BOOTSTRAP_CITRINEOS_DATABASE_MAX_RETRIES: ${RDS_MAX_RETRIES:-5}
      BOOTSTRAP_CITRINEOS_DATABASE_RETRY_DELAY: ${RDS_RETRY_DELAY:-5000}
      BOOTSTRAP_CITRINEOS_DATABASE_POOL_MAX: ${RDS_POOL_MAX:-20}
      BOOTSTRAP_CITRINEOS_DATABASE_POOL_MIN: ${RDS_POOL_MIN:-5}
      # Config filename
      BOOTSTRAP_CITRINEOS_CONFIG_FILENAME: 'config.json'
      # === AWS S3 FILE STORAGE CONFIGURATION ===
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_TYPE: 's3'
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_S3_REGION: ${AWS_REGION:-ap-south-1}
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_S3_DEFAULT_BUCKET_NAME: ${S3_BUCKET_NAME:-citrineos-files}
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_S3_FORCE_PATH_STYLE: 'false'
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_S3_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_S3_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # AWS Configuration (for SDK)
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # Yatri Energy Integration
      YATRI_ENERGY_BASE_URL: ${YATRI_ENERGY_BASE_URL:-https://api.dev.yatri-energy.yatrimotorcycle.com}
      YATRI_ENERGY_API_KEY: ${YATRI_ENERGY_API_KEY:-}
      YATRI_ENERGY_TIMEOUT: ${YATRI_ENERGY_TIMEOUT:-10000}
      YATRI_MINIMUM_BALANCE: ${YATRI_MINIMUM_BALANCE:-100.0}
      YATRI_WALLET_INTEGRATION_ENABLED: ${YATRI_WALLET_INTEGRATION_ENABLED:-true}
    depends_on:
      amqp-broker:
        condition: service_healthy
    ports:
      - 8080:8080
      - 8081:8081
      - 8082:8082
      - 8443:8443
      - 8444:8444
      - 9229:9229
      - 8092:8092
      - 8093:8093
      - 8094:8094
      - 8095:8095
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "const net = require(\"net\"); const client = net.createConnection(8080, \"127.0.0.1\", () => { client.end(); process.exit(0); }); client.on(\"error\", () => process.exit(1)); client.setTimeout(5000, () => { client.destroy(); process.exit(1); });"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  graphql-engine:
    image: hasura/graphql-engine:v2.40.3.cli-migrations-v3
    volumes:
      - ./hasura-metadata:/hasura-metadata
    ports:
      - 8090:8080
    restart: always
    depends_on:
      citrine:
        condition: service_healthy
    environment:
      # === AWS RDS DATABASE URL FOR HASURA ===
      HASURA_GRAPHQL_DATABASE_URL: postgres://${RDS_USERNAME}:${RDS_PASSWORD}@${RDS_HOST}:${RDS_PORT:-5432}/${RDS_DATABASE:-citrine}?sslmode=require
      ## enable the console served by server
      HASURA_GRAPHQL_ENABLE_CONSOLE: 'true'
      ## enable debugging mode
      HASURA_GRAPHQL_DEV_MODE: 'true'
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
      HASURA_GRAPHQL_ENABLE_TELEMETRY: 'false'
      HASURA_GRAPHQL_METADATA_DEFAULTS: '{"backend_configs":{"dataconnector":{"athena":{"uri":"http://data-connector-agent:8081/api/v1/athena"},"mariadb":{"uri":"http://data-connector-agent:8081/api/v1/mariadb"},"mysql8":{"uri":"http://data-connector-agent:8081/api/v1/mysql"},"oracle":{"uri":"http://data-connector-agent:8081/api/v1/oracle"},"snowflake":{"uri":"http://data-connector-agent:8081/api/v1/snowflake"}}}}'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://graphql-engine:8080/healthz']
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 5s
