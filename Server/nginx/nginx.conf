# CitrineOS Nginx Configuration
# Domain: core.api.test.yatrienergy.com
# Terminates TLS and proxies to Docker containers on localhost

# --- Port 80: ACME challenge + HTTPS redirect ---
server {
    listen 80;
    server_name core.api.test.yatrienergy.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Port 443: CitrineOS REST API ---
server {
    listen 443 ssl;
    server_name core.api.test.yatrienergy.com;

    ssl_certificate /etc/letsencrypt/live/core.api.test.yatrienergy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/core.api.test.yatrienergy.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Port 8092: OCPP 1.6 WSS (Tenant 1) ---
server {
    listen 8092 ssl;
    server_name core.api.test.yatrienergy.com;

    ssl_certificate /etc/letsencrypt/live/core.api.test.yatrienergy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/core.api.test.yatrienergy.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:18092;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

