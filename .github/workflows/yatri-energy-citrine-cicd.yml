name: Yatri Energy CitrineOS CI/CD

on:
  push:
    branches:
      - cicd
  workflow_dispatch:

env:
  CITRINE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/yatri-energy-citrine
  HASURA_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/yatri-energy-hasura

jobs:
  sonarcloud:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for full blame/history analysis

      - name: Run SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Check SonarQube quality gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: sonarcloud # Only run if Sonar quality gate passes
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-citrineos-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-citrineos-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push CitrineOS image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Server/deploy.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.CITRINE_IMAGE }}:cicd
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push Hasura image
        uses: docker/build-push-action@v5
        with:
          context: ./Server
          file: ./Server/hasura.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.HASURA_IMAGE }}:cicd

      # Move cache to avoid ever-growing cache
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Write job summary
        run: |
          echo "## Docker Images Pushed Successfully! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| CitrineOS | \`${{ env.CITRINE_IMAGE }}:cicd\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Hasura    | \`${{ env.HASURA_IMAGE }}:cicd\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Watchtower will automatically pull and deploy these images on EC2." >> $GITHUB_STEP_SUMMARY
