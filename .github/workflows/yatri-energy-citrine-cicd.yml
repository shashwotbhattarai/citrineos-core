name: Yatri Energy CitrineOS CI/CD

on:
  push:
    branches:
      - cicd
      - dev
  workflow_dispatch:

env:
  CITRINE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/yatri-energy-citrine
  HASURA_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/yatri-energy-hasura

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-citrineos-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-citrineos-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push CitrineOS image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Server/deploy.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.CITRINE_IMAGE }}:${{ github.ref_name }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push Hasura image
        uses: docker/build-push-action@v5
        with:
          context: ./Server
          file: ./Server/hasura.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.HASURA_IMAGE }}:${{ github.ref_name }}

      # Move cache to avoid ever-growing cache
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Summary
        run: |
          echo "## Docker Images Pushed Successfully! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**CitrineOS Image:** \`${{ env.CITRINE_IMAGE }}:${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Hasura Image:** \`${{ env.HASURA_IMAGE }}:${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Watchtower will automatically pull and deploy these images on EC2." >> $GITHUB_STEP_SUMMARY
